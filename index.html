<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="./images/ghost.ico" type="image/x-icon" />
    <link rel="icon" href="./images/ghost.ico" type="image/x-icon" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Creepster&family=Emilys+Candy&family=Open+Sans:wght@300&display=swap"
      rel="stylesheet"
    />
    <script type="text/javascript" src="script.js"></script>
    <title>Ghost Game 👻</title>
  </head>
  <body>
    <audio id="theme" loop>
      <source src="./sounds/theme.mp3" type="audio/mpeg" />
    </audio>

    <div id="darkness"></div>

    <div id="start-screen">
      <h1 id="start-title">👻 Ghost Game</h1>
      <button id="start-btn">START</button>
    </div>

    <div id="main" style="display: none">
      <img id="scary-face" src="./images/scaryFace.jpg" alt="Scary face" />

      <div id="div-score">
        <div id="score-wrap">
          <h2 id="score">SCORE: 0</h2>
        </div>
      </div>

      <div id="stage">
        <div id="ghost-wrapper">
          <h1 id="ghost">👻</h1>
        </div>
        <h1 id="skull">💀</h1>
      </div>
    </div>

    <audio id="oou">
      <source src="./sounds/oou.mp3" type="audio/mpeg" />
    </audio>

    <audio id="scream">
      <source src="./sounds/scream.mp3" type="audio/mpeg" />
    </audio>
  </body>
</html>
